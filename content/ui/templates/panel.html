<div id="icn-panel" class="icn-panel">

  <!-- Header -->
  <div id="icn-panel-header" class="icn-panel-header">
    <span class="icn-panel-title">OLAF × CIEL</span>
    <div class="icn-panel-actions">
      <button id="icn-minimize" class="icn-btn-icon" title="Réduire / Agrandir">−</button>
    </div>
  </div>

  <!-- Body -->
  <div id="icn-panel-body" class="icn-panel-body">

    <!-- Contours -->
    <div class="icn-section">
      <div class="icn-section-label">Contours Alpha / Beta</div>
      <div class="icn-toggle-row">
        <label class="icn-toggle">
          <input type="checkbox" id="icn-contours-toggle">
          <span class="icn-toggle-track"><span class="icn-toggle-thumb"></span></span>
        </label>
        <span id="icn-contours-status" class="icn-status-text">Inactif</span>
      </div>
    </div>

    <!-- OLAF -->
    <div class="icn-section">
      <div class="icn-section-label">Connexion OLAF</div>
      <input type="text" id="icn-olaf-login" class="icn-input" placeholder="Login" autocomplete="off">
      <div class="icn-pass-row">
        <input type="password" id="icn-olaf-pass" class="icn-input icn-input-pass" placeholder="Mot de passe" autocomplete="new-password">
        <button id="icn-toggle-password" class="icn-btn-eye" title="Afficher / masquer">👁</button>
      </div>
      <label class="icn-check-row">
        <input type="checkbox" id="icn-olaf-remember">
        <span>Mémoriser le mot de passe</span>
      </label>
      <div class="icn-toggle-row" style="margin-top:8px;">
        <label class="icn-toggle">
          <input type="checkbox" id="icn-olaf-autoload">
          <span class="icn-toggle-track"><span class="icn-toggle-thumb"></span></span>
        </label>
        <span class="icn-status-text">Auto-chargement</span>
      </div>
      <button id="icn-olaf-test" class="icn-btn icn-btn-primary" style="margin-top:10px;">Mettre à jour les contours</button>
      <div id="icn-olaf-status" class="icn-feedback"></div>
    </div>

    <!-- Congés (à venir) -->
    <div class="icn-section icn-section-last">
      <div class="icn-section-label">Envoi de congés</div>
      <div class="icn-placeholder">
        <span>🚧 Fonctionnalité à venir</span>
      </div>
    </div>

    <div id="icn-status-message" class="icn-feedback hidden"></div>
  </div>

  <!-- Onglet settings : HORS du panel settings pour rester visible même quand ce dernier est fermé -->
  <div id="icn-settings-tab" class="icn-settings-tab" title="Paramètres">⚙</div>

  <!-- Settings panel latéral -->
  <div id="icn-settings-panel" class="icn-settings-panel">
    <div class="icn-settings-content">
      <div class="icn-settings-title">Paramètres</div>

      <div class="icn-set-section">
        <div class="icn-set-label">Mode</div>
        <div class="icn-radio-group">
          <label class="icn-radio-btn"><input type="radio" name="learning-mode" value="normal" checked><span>Normal</span></label>
          <label class="icn-radio-btn"><input type="radio" name="learning-mode" value="alpha"><span>Alpha</span></label>
          <label class="icn-radio-btn"><input type="radio" name="learning-mode" value="beta"><span>Beta</span></label>
        </div>
        <div id="icn-learning-instructions" class="icn-hint" style="display:none;">Cliquez sur les cases du type sélectionné.</div>
      </div>

      <div class="icn-set-section">
        <div class="icn-set-label">Alpha (congés) <span id="icn-alpha-count" class="icn-badge">0</span></div>
        <div id="icn-alpha-list" class="icn-class-list"><span class="icn-empty">Aucune classe</span></div>
      </div>

      <div class="icn-set-section">
        <div class="icn-set-label">Beta (stages) <span id="icn-beta-count" class="icn-badge">0</span></div>
        <div id="icn-beta-list" class="icn-class-list"><span class="icn-empty">Aucune classe</span></div>
      </div>

      <div class="icn-set-section">
        <div class="icn-set-label">Premier jour J1</div>
        <input type="date" id="icn-cycle-start-date" class="icn-input">
      </div>

      <div class="icn-set-section">
        <div class="icn-set-label">Longueur du cycle</div>
        <div class="icn-radio-group">
          <label class="icn-radio-btn"><input type="radio" name="cycle-length" value="6"><span>6 j.</span></label>
          <label class="icn-radio-btn"><input type="radio" name="cycle-length" value="12" checked><span>12 j.</span></label>
        </div>
      </div>

      <div class="icn-set-section">
        <div class="icn-set-label">Jours travaillés</div>
        <div id="icn-working-days-container" class="icn-days-grid"></div>
      </div>
    </div>
  </div>

</div>
